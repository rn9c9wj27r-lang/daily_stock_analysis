name: Daily Stock Analysis - Cloud Compute & Push
on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:
concurrency:
  group: dsa-workflow-group
  cancel-in-progress: false
permissions:
  contents: write
  actions: read
env:
  STOCK_LIST: ${{ secrets.STOCK_LIST }}
  LLM_MODEL: "gemini-2.5-flash-lite"
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
jobs:
  analyze_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'apps/dsa-web/renderer/package-lock.json'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends wkhtmltopdf xvfb chromium-browser
        sudo apt-get clean && sudo rm -rf /var/lib/apt/lists/*

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi

    - name: Build Frontend (Vite 编译)
      env:
        VITE_BASE_URL: '/daily_stock_analysis/'
      run: |
        set -e
        cd apps/dsa-web/renderer
        if [ -f package-lock.json ]; then
          npm ci --prefer-offline --no-audit
        else
          echo "::warning::renderer/package-lock.json 不存在，回退到 npm install"
          npm install --no-audit
        fi
        npm run build
        if [ ! -d "dist" ]; then
          echo "::error::Vite 构建失败：未生成 dist"
          exit 1
        fi
        cd ../..

    - name: Run Market Analysis (数据底座计算)
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BASE_URL: ${{ secrets.VERTEX_API_BASE }}
      run: |
        set -e
        mkdir -p docs/data/cache
        python main.py --force-run

    - name: Prepare Deployment Artifacts
      run: |
        set -e
        rm -rf docs
        mkdir -p docs/data
        if [ -d "data" ] && [ -n "$(ls -A data 2>/dev/null)" ]; then
          cp -r data/* docs/data/
        fi
        if [ -d "apps/dsa-web/renderer/dist" ]; then
          echo "✅ 迁移 Vite 构建产物到 docs/"
          cp -r apps/dsa-web/renderer/dist/* docs/
        else
          echo "::error::未发现 apps/dsa-web/renderer/dist"
          exit 1
        fi

    - name: Inject Stock Data into Static Pages
      run: python scripts/inject_data.py

    - name: Commit & Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add docs/
        if git diff --cached --quiet; then
          echo "✅ 无变动，跳过推送。"
        else
          git commit -m "chore: 📈 静态看盘部署 - $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
        fi
