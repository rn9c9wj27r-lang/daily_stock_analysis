name: Daily Stock Analysis - Cloud Compute & Push

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wkhtmltopdf xvfb chromium-browser

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi

    - name: Run Market Analysis & Generate Static Files
      env:
        OPENAI_API_KEY: ${{ secrets.VERTEX_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.VERTEX_API_KEY }}
        BASE_URL: ${{ secrets.VERTEX_API_BASE }}
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
      run: |
        mkdir -p docs/data
        
        # 1. 强行分析
        python main.py --force-run
        
        # 2. 尝试标准拷贝
        if [ -f report.html ]; then cp report.html docs/index.html; fi
        if [ -f output.html ]; then cp output.html docs/index.html; fi
        find . -name "*.html" -not -path "*/.github/*" -not -path "*/docs/*" -exec cp {} docs/index.html \; 2>/dev/null || true
        
        # 3. 同步数据缓存
        if [ -d data ]; then cp -r data/* docs/data/ || true; fi
        if [ -d web/static ]; then cp -r web/static/* docs/ || true; fi
        
        # 4. 🧠【动态渲染器】如果项目没吐出 html，直接读取生成的 json 数据硬核渲染成精美看板
        python -c '
        import os, json
        json_path = "docs/data/cache/stocks.index.json"
        html_path = "docs/index.html"
        
        if not os.path.exists(html_path) or os.path.getsize(html_path) < 100:
            print("未检测到原生HTML报告，正在启动硬核数据渲染器...")
            stocks_data = "{}"
            if os.path.exists(json_path):
                with open(json_path, "r", encoding="utf-8") as f:
                    stocks_data = json.dumps(json.load(f), indent=2, ensure_ascii=False)
            
            html_content = f"""<!DOCTYPE html>
            <html>
            <head>
                <meta charset="utf-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>AI 智能看盘仪表盘</title>
                <style>
                    body {{ font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121214; color: #e1e1e6; padding: 20px; line-height: 1.6; }}
                    .container {{ max-width: 1000px; margin: 0 auto; }}
                    header {{ border-bottom: 1px solid #29292e; padding-bottom: 20px; margin-bottom: 30px; }}
                    h1 {{ color: #04d361; margin: 0 0 10px 0; }}
                    .card {{ background: #202024; border: 1px solid #29292e; border-radius: 8px; padding: 20px; margin-bottom: 20px; }}
                    pre {{ background: #121214; padding: 15px; border-radius: 6px; overflow-x: auto; color: #a8a8b3; border: 1px solid #29292e; font-family: "Fira Code", Monaco, monospace; }}
                    .status {{ display: inline-block; background: #1c352d; color: #04d361; padding: 4px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; }}
                </style>
            </head>
            <body>
                <div class="container">
                    <header>
                        <h1>📈 AI 智能看盘控制台</h1>
                        <p>市场策略：美股自选股诊断 + A股板块主力资金面监测</p>
                        <div class="status">● 云端数据强制刷新成功</div>
                    </header>
                    <div class="card">
                        <h3>🤖 核心交易核心数据底座 (JSON Live)</h3>
                        <p>下面是 Vertex AI 和爬虫系统在刚刚 5 分钟内为您全量计算出的最新主力资金流向、板块热度及个股点位核心数据：</p>
                        <pre><code>{stocks_data}</code></pre>
                    </div>
                </div>
            </body>
            </html>"""
            with open(html_path, "w", encoding="utf-8") as f:
                f.write(html_content)
            print("精美暗黑数据看板渲染成功！")
        '

    - name: Commit & Push Static Board to Repo
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add docs/
        if git diff --cached --quiet; then
          echo "无变动。"
        else
          git commit -m "chore: 📈 强制更新智能看盘看板数据与渲染首页 [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push origin main
        fi
