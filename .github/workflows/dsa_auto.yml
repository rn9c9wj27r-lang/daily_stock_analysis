name: Daily Stock Analysis - Cloud Compute & Push

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies (核心：HTML与图表渲染引擎)
      run: |
        sudo apt-get update
        sudo apt-get install -y wkhtmltopdf xvfb chromium-browser

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi

    - name: Run Market Analysis & Generate Static Files
      env:
        OPENAI_API_KEY: ${{ secrets.VERTEX_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.VERTEX_API_KEY }}
        BASE_URL: ${{ secrets.VERTEX_API_BASE }}
        STOCK_LIST: ${{ secrets.STOCK_LIST }}
        
        # 🤖 核心配置：在这里指定你的自定义路由所支持的具体模型名称
        # 如果你的中转支持其他模型，可以修改此处，如 gemini-2.5-pro, gpt-4o, claude-3-5-sonnet 等
        LLM_MODEL: "gemini-3.1-flash-lite"
      run: |
        # 1. 重置并创建干净的 docs 目录
        rm -rf docs
        mkdir -p docs/data
        
        # 2. 强行执行核心分析任务，无视交易日限制
        python main.py --force-run
        
        # 3. 🔍 资产捕捉：如果项目自带将缓存转为静态 HTML 报告的脚本，优先调用
        # (通常项目有类似 generate_report.py 或通过 main 参数直接生成)
        if [ -f generate_report.py ]; then python generate_report.py || true; fi
        
        # 4. 🧲 雷达强力收刮：捕获分析后落盘的任何原生 HTML 报告
        found_report=false
        for f in $(find . -maxdepth 3 -name "*.html" -not -path "*/.github/*" -not -path "*/web/*"); do
          echo "发现生成的行情快照文件: $f"
          cp "$f" docs/index.html
          found_report=true
          break
        done
        
        # 5. 🎛️ 终极降维打击：如果项目在非交易日坚决不吐 HTML，我们直接抓取它刚刚 5 分钟算出来的最新数据 JSON，
        # 并用 Python 在本地将分析文本渲染成一个精美、立等可取的单文件报告，防止 WebUI 找不到后端卡死。
        if [ "$found_report" = false ]; then
          echo "未发现标准 HTML 报告，启动本地数据模板渲染器..."
          python -c '
        import os, json, glob
        json_files = glob.glob("data/cache/*.json") + glob.glob("*.json")
        data_summary = {}
        for jf in json_files:
            if "doc" in jf or "package" in jf: continue
            try:
                with open(jf, "r", encoding="utf-8") as f: data_summary[os.path.basename(jf)] = json.load(f)
            except: pass
        
        html_content = f"""<!DOCTYPE html>
        <html>
        <head>
            <meta charset="utf-8"><title>AI 智能看盘快照</title>
            <style>
                body {{ font-family: -apple-system, sans-serif; background: #121214; color: #e1e1e6; padding: 30px; }}
                .container {{ max-width: 900px; margin: 0 auto; }}
                h1 {{ color: #04d361; border-bottom: 1px solid #29292e; padding-bottom: 10px; }}
                .box {{ background: #202024; border: 1px solid #29292e; padding: 20px; border-radius: 8px; margin-top: 20px; }}
                pre {{ background: #121214; padding: 15px; border-radius: 6px; overflow-x: auto; color: #04d361; border: 1px solid #29292e; font-family: monospace; }}
            </style>
        </head>
        <body>
            <div class="container">
                <h1>📊 每日自选股与大盘资金面复盘快照</h1>
                <p>底层驱动：Vertex AI (模型: {os.getenv("LLM_MODEL", "默认")}) | 云端计算托管已成功</p>
                <div class="box">
                    <h3>🤖 核心计算层输出资产 (Live Data)</h3>
                    <pre><code>{json.dumps(data_summary, indent=2, ensure_ascii=False) if data_summary else "模型调用已成功，暂未发现本地数据落盘，请检查 STOCK_LIST 变量是否正确传入。"}</code></pre>
                </div>
            </div>
        </body>
        </html>"""
        with open("docs/index.html", "w", encoding="utf-8") as f: f.write(html_content)
        '
        fi

    - name: Commit & Push Static Board to Repo
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add docs/
        if git diff --cached --quiet; then
          echo "没有新生成的数据变更"
        else
          git commit -m "chore: 📈 注入模型参数并全量强制刷新静态看板 [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push origin main
        fi
