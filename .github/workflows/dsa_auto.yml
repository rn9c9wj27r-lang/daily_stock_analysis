name: Daily Stock Analysis - Cloud Compute & Push

on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:

concurrency:
  group: dsa-workflow-group
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

env:
  STOCK_LIST: ${{ secrets.STOCK_LIST }}
  LLM_MODEL: "gemini-3.1-flash-lite"
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  analyze_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'apps/dsa-web/package-lock.json' # 锁定高精确缓存路径

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends wkhtmltopdf xvfb chromium-browser
        sudo apt-get clean && sudo rm -rf /var/lib/apt/lists/*

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi

    - name: Build Frontend (Vite 专精编译)
      id: build_frontend
      continue-on-error: true
      run: |
        set -e
        if [ -f "apps/dsa-web/package.json" ]; then
          echo "📦 进入 apps/dsa-web 开始构建生产级 React 静态资源..."
          cd apps/dsa-web
          npm ci --prefer-offline --no-audit
          npm run build
          cd ../..
          echo "BUILD_SUCCESS=true" >> "$GITHUB_ENV"
        else
          echo "❌ 错误：未在 apps/dsa-web 下发现前端项目！"
          exit 1
        fi

    - name: Run Market Analysis (数据底座离线计算)
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BASE_URL: ${{ secrets.VERTEX_API_BASE }}
      run: |
        set -e
        mkdir -p docs/data/cache
        python main.py --force-run

    - name: Prepare Deployment Artifacts (编译产物清洗与转正)
      run: |
        set -e
        # 1. 迁移计算出的行情底座 JSON 到 Pages 目录
        if [ -d "data" ]; then cp -r data/* docs/data/ 2>/dev/null || true; fi
        
        # 2. 🧲 精准收刮 Vite 编译出来的 dist 静态产物，转移至 Pages 的 docs/ 根目录
        if [ -d "apps/dsa-web/dist" ]; then
          echo "✅ 成功捕获 Vite 编译构建产物，正在转正至 docs/"
          cp -r apps/dsa-web/dist/* docs/
        else
          echo "⚠️ 警告：未发现 apps/dsa-web/dist 编译产物，检查前端是否报错。"
        fi

    - name: Inject Stock Data into Static Pages (将行情深度穿透进打包后的 index.html)
      run: python scripts/inject_data.py

    - name: Commit & Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add docs/ 2>/dev/null || true
        
        if git diff --cached --quiet; then
          echo "✅ 无变动，跳过推送。"
        else
          git commit -m "chore: 📈 Vite 自动化看盘编译 - 全量美股K线就绪 [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push origin main
        fi
