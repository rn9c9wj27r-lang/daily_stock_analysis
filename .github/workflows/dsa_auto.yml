name: Daily Stock Analysis - Cloud Compute & Push

on:
  schedule:
    # 🕒 自动化定时：每天北京时间早上 06:30 (UTC 22:30) 自动触发
    - cron: '30 22 * * *'
  workflow_dispatch:

concurrency:
  group: dsa-workflow-group
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

env:
  STOCK_LIST: ${{ secrets.STOCK_LIST }}
  LLM_MODEL: "gemini-3.1-flash-lite"
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  analyze_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends wkhtmltopdf xvfb chromium-browser
        sudo apt-get clean && sudo rm -rf /var/lib/apt/lists/*

    - name: Install Python Dependencies (按优先级环境隔离)
      run: |
        python -m pip install --upgrade pip setuptools wheel
        if [ -f requirements.lock.txt ]; then
          echo "📌 发现锁定版本依赖（requirements.lock.txt）"
          pip install --no-cache-dir -r requirements.lock.txt
        elif [ -f requirements.txt ]; then
          echo "📦 发现标准依赖文件（requirements.txt）"
          pip install --no-cache-dir -r requirements.txt
        else
          echo "⚠️ 未找到任何 Python 依赖文件，跳过安装"
        fi

    - name: Build Frontend (编译前端 K 线组件与资金面板)
      id: build_frontend
      continue-on-error: true
      run: |
        set -e
        BUILD_SUCCESS=false
        if [ -f "package.json" ]; then
          echo "📦 检测到根目录 package.json，开始构建..."
          npm ci --prefer-offline --no-audit
          npm run build && BUILD_SUCCESS=true
        elif [ -f "web/package.json" ]; then
          echo "📦 检测到 web/ 目录 package.json，开始构建..."
          cd web && npm ci --prefer-offline --no-audit
          npm run build && BUILD_SUCCESS=true
          cd ..
        else
          echo "⚠️ 未找到 package.json，跳过前端编译"
        fi
        echo "BUILD_SUCCESS=$BUILD_SUCCESS" >> "$GITHUB_ENV"

    - name: Run Market Analysis (执行底层数据抓取与大模型诊断)
      id: market_analysis
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BASE_URL: ${{ secrets.VERTEX_API_BASE }}
      run: |
        set -e
        mkdir -p docs/data/cache
        echo "🚀 启动股票市场分析引擎..."
        
        if ! python main.py --force-run; then
          echo "⚠️ 核心分析脚本返回非零状态，启动自愈链路检查..."
          if [ -f "data/cache/stocks.json" ] || [ -f "docs/data/cache/stocks.json" ] || [ -n "$(ls -A docs/data/cache/ 2>/dev/null)" ]; then
            echo "✅ [降级路径] 检测到历史有效行情缓存，继续执行页面渲染流程"
            exit 0
          else
            echo "❌ [绝望路径] 既无新生成数据，也无本地历史缓存，流程强行中止"
            exit 1
          fi
        fi
        echo "✅ [最优路径] 数据全量刷新分析完成！"

    - name: Prepare Deployment Artifacts (智能产物收刮与验证)
      run: |
        set -e
        echo "🔍 开始合并分析资产..."
        if [ -d "data" ]; then cp -r data/* docs/data/ 2>/dev/null || true; fi
        
        echo "🔍 验证并转正前端构建产物..."
        ARTIFACT_FOUND=false
        for dir in dist build web/dist web/build web/static; do
          if [ -d "$dir" ] && [ -n "$(ls -A "$dir" 2>/dev/null)" ]; then
            echo "✅ 成功捕获静态构建产物: $dir"
            cp -r "$dir"/* docs/ 2>/dev/null || true
            ARTIFACT_FOUND=true
          fi
        done
        
        if [ "$ARTIFACT_FOUND" = false ] && [ "$BUILD_SUCCESS" = "true" ]; then
          echo "⚠️ 前端构建脚本标记成功，但未发现物理产物文件夹，采取降级防灾机制"
        fi
        
        for script in export_static.py generate_report.py; do
          if [ -f "$script" ]; then python "$script" || true; fi
        done

    - name: Inject Stock Data into Static Pages (面向对象高级穿透注入)
      run: python scripts/inject_data.py

    - name: Commit & Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add docs/ 2>/dev/null || true
        
        if git diff --cached --quiet; then
          echo "✅ 今日数据与图表资产无任何变动，跳过推送。"
        else
          git commit -m "chore: 📈 智能编译看盘系统 - 实时美股K线与A股资金流就绪 [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push origin main || { echo "❌ 推送失败，可能有并发冲突或网络波动"; exit 1; }
        fi
