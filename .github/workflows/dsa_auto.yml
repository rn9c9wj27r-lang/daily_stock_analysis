name: Daily Stock Analysis - Cloud Compute & Push
on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch:
concurrency:
  group: dsa-workflow-group
  cancel-in-progress: false          # 改：避免中断正在进行的部署
permissions:
  contents: write
  actions: read
env:
  STOCK_LIST: ${{ secrets.STOCK_LIST }}
  LLM_MODEL: "gemini-3.1-flash-lite" 
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
jobs:
  analyze_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: 'apps/dsa-web/package-lock.json'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends wkhtmltopdf xvfb chromium-browser
        sudo apt-get clean && sudo rm -rf /var/lib/apt/lists/*

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        if [ -f requirements.txt ]; then pip install --no-cache-dir -r requirements.txt; fi

    - name: Build Frontend
      # 改：移除 continue-on-error，构建失败立即终止，不部署残缺产物
      run: |
        set -e
        if [ ! -f "apps/dsa-web/package.json" ]; then
          echo "::error::未在 apps/dsa-web 下发现前端项目"
          exit 1
        fi
        echo "📦 构建 React 静态资源..."
        cd apps/dsa-web
        npm ci --prefer-offline --no-audit
        # 通过 --base CLI 直接传入，确保 /assets/ 前缀正确
        # （环境变量 VITE_BASE_URL 单独不生效，Vite 不会自动读取它作为 base）
        npx vite build --base /daily_stock_analysis/
        cd ../..

    - name: Run Market Analysis
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        BASE_URL: ${{ secrets.VERTEX_API_BASE }}
      run: |
        set -e
        mkdir -p docs/data/cache
        python main.py --force-run

    - name: Prepare Deployment Artifacts
      run: |
        set -e
        mkdir -p docs/data              # 改：显式创建，不再依赖前序步骤的副作用
        # 迁移行情数据
        if [ -d "data" ] && [ -n "$(ls -A data 2>/dev/null)" ]; then
          cp -r data/* docs/data/
        else
          echo "::warning::data/ 目录为空或不存在"
        fi
        # 迁移 Vite 编译产物
        if [ -d "apps/dsa-web/dist" ]; then
          echo "✅ 迁移 Vite 构建产物至 docs/"
          cp -r apps/dsa-web/dist/* docs/
        else
          echo "::error::未发现 apps/dsa-web/dist，前端构建失败"
          exit 1
        fi

    - name: Inject Stock Data into Static Pages
      run: python scripts/inject_data.py

    - name: Commit & Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add docs/ 2>/dev/null || true
        if git diff --cached --quiet; then
          echo "✅ 无变动，跳过推送"
        else
          git commit -m "chore: 📈 自动化看盘编译 - K线数据就绪 [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push origin main
        fi
